scene: '# 场景：动摇的心


  ## 地点

  礼堂侧门外的小花园


  ## 环境

  "……我们出去走走吧。"


  小夏轻声说。她没有等你回答，转身朝礼堂侧门走去。你愣了一下，跟了上去。


  侧门外是一个小花园。几棵樱花树零星地分布在草丛中，花期已过，只剩下满地的落红和尚未凋零的花瓣。树下有一张长椅，木质的座位被雨水和岁月侵蚀出斑驳的痕迹。


  小夏在长椅的一端坐下，拍了拍身边的位置。


  "坐吧。"


  你在她身边坐下。两个人之间隔着一个拳头的距离，不远，却也没有更近。


  风吹过，樱花树发出沙沙的声响。远处的礼堂里传来阵阵掌声和欢呼声——毕业典礼大概正在进行。但这些都像是另一个世界的事情，和这个安静的小花园无关。


  小夏从口袋里掏出一瓶矿泉水，拧开盖子，递给你。


  "喝点水吧。你今天早上什么都没吃吧？"


  她的语气很平淡，像是在陈述一个事实。你确实不记得自己有没有吃过早餐，胃里空空的，但奇怪的是你并不觉得饿。


  小夏双手捧着自己的那瓶水，低着头，看着地面。她的侧脸在阳光下显得很柔和，但你注意到她的睫毛在微微颤抖，像是在忍耐着什么。


  沉默持续了很久。


  最后，她开口了。


  "你真的……什么都不记得了吗？"


  她的声音很轻，轻得几乎要被风吹散。她没有看你，只是盯着地面，等待你的回答。


  ---


  ## 可见环境

  - 小花园里的樱花树和长椅

  - 远处礼堂的红色帷幕

  - 地上散落的樱花花瓣


  ## 可探索方向

  - "谢谢你……能告诉我我们是怎么认识的吗？"

  - "毕业典礼……我们要做什么？"

  - "我想一个人静静"

  '
story: '# 故事：动摇的心


  你接过那瓶水，喝了一口。


  凉意顺着喉咙滑下去，让你混沌的脑袋清醒了一些。你不知道该怎么回答她的问题。"你真的什么都不记得了吗"——这个问题像一把钥匙，插在一扇锈迹斑斑的门上，却怎么也打不开。


  "我不知道。"你说，声音沙哑得像是自己的，又像是别人的，"我醒来的时候……就什么都不记得了。"


  小夏没有说话。


  她只是点了点头，肩膀微微下沉，像是被什么东西压了一下。然后她抬起头，看向那棵樱花树。阳光穿过树叶的缝隙，在她的脸上投下斑驳的光影。


  "那我告诉你吧。"


  她说。


  "我们是在大一的时候认识的。图书馆，你坐在靠窗的位置，我在你对面坐下。你抬头看了我一眼，然后笑了。"


  她的嘴角微微上扬，像是在回味某个珍贵的瞬间。


  "那是我见过的最好看的笑容。"


  她转过头，看向你。阳光落在她的眼睛里，让那双眼睛看起来格外明亮——又或者，那只是因为她一直在忍着泪水。


  "从那天起，我们就成了朋友。然后是……"


  她顿了顿，像是在斟酌用词。


  "……比朋友更重要的人。"


  她说这话的时候，声音很轻很轻，像是在说一个不能让第三个人听到的秘密。


  "四年了。"她说，"我们认识四年了。"


  风吹过，樱花树发出沙沙的声响。花瓣从枝头落下，飘落在你们之间的空隙里。


  "我知道你最近……经历了一些事情。"小夏的声音变得更轻了，"可能会很难熬。但是……"


  她转过头，直视着你的眼睛。


  "但是我想让你知道，你不是一个人。"


  她的手慢慢地伸过来，小心翼翼地碰了碰你的手背。那个动作很轻，像是在试探你的反应。


  "我会陪着你。"


  "一直。"


  ---


  *你就那样坐着，任由她的手指轻轻触碰着你的手背。*


  *你不记得她。*


  *但你的身体记得。*


  *你的心跳在说谎——它跳得太快了，快得像是见到了什么人。*


  *而那个人，就在你身边。*

  '
