scene: '# 场景：碎片拼凑


  毕业典礼的礼堂后台，昏暗的灯光在走廊尽头摇曳。


  你不知道自己是怎么走到这里的。也许是跟着小夏，也许是被某种直觉牵引。周围堆满了落灰的桌椅和被丢弃的装饰道具，空气中有一股陈旧的气息。


  小夏站在你面前，低着头，双手紧紧握在一起。她的肩膀在微微发抖。


  你们沉默了很久。


  终于，你开口了。


  "我想起来了……"你说，声音有些沙哑，"一些片段。"


  她猛地抬起头，眼眶红了。泪光在昏暗的灯光下闪烁，像是碎掉的星星。


  "樱花树下的石碑。"你继续说，"暴雨中在校门口等我的人。还有……天台上写下的约定。"


  每一个词，都像是从记忆的碎片中打捞上来的贝壳。破碎，却依然闪着光。


  "每年今天都要去那里。"你说，"''永远在一起''。还有那本日记……"


  你的声音开始颤抖。


  "我答应过要和你一起写的。"


  小夏的眼泪终于落了下来。她没有说话，只是用力握紧了你的手。


  她的手心是凉的，指尖在发抖。但那个握紧的力度，比任何语言都更用力。


  "我想起来了。"你说，"你抱着我说，就算我忘记了，你也会替我记得。"


  你看着她的眼睛。


  "我记得你。"


  ---


  **场景**: 礼堂后台

  **时间**: 毕业典礼开始前

  **状态**: 记忆部分恢复，情感爆发'
story: '# 故事：碎片拼凑


  泪水从她的脸上滑落，滴在你们交握的手背上。


  小夏没有说话。她只是哭。无声地、用力地、像是把四年的眼泪都在这一刻流尽。


  你看着她的样子，心里某个地方隐隐作痛。


  "对不起。"你听到自己说。


  她摇摇头，哽咽着："不是你的错……从来都不是你的错……"


  "是我自己选的。"她说，声音断断续续，"是你自己选的……"


  你愣住了。


  "什么……"


  她终于抬起头，看着你。泪眼朦胧，却有一种如释重负的表情。


  "你想起来了一部分。"她说，"但不是全部。"


  她松开你的手，后退了一步。从身后的架子上，她拿起了什么东西。


  那是一份文件夹。封面上的字让你的心跳漏了一拍——


  **"梦境协议"**


  "有些事……"她的声音很轻，"我应该告诉你了。"


  她的手在发抖，但还是把文件夹递到了你面前。


  "但在那之前。"她深吸一口气，"我想让你知道——"


  "不管你记起了什么，不管你接下来怎么选……"


  她的眼睛直视着你，泪水还挂在睫毛上，但目光前所未有的坚定。


  "我都在。"


  ---


  **四年的秘密，即将揭晓。**


  **你手中握着那份文件夹，沉甸甸的。**'
