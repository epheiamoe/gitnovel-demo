note: '# 线索笔记


  ## 本次发现

  - 📝 **纸条**: "去礼堂前，先去104教室看看" —— 来自"小夏"

  - 🤔 **违和感**: 你对自己的身份一无所知，却本能地觉得"小夏"这个名字很重要


  ## 待解之谜

  - ❓ **失忆**: 为什么会失去所有记忆？

  - ❓ **小夏**: 这个人是谁？为什么要给你留纸条？

  - ❓ **一闪而过的画面**: 图书馆、某人的笑容、有人在叫你……那是真实的记忆吗？


  ## 环境细节

  - 你穿着皱巴巴的白衬衫和学士服，扣错了扣子

  - 周围都是兴奋的毕业生，没人注意到你的异常

  - 那盏日光灯似乎快要坏了


  ## 内心感受

  一阵一阵的头痛，像是有什么东西被封印住了。也许104教室里，真的有什么在等着你。


  ---


  *（这份笔记会随着探索而增加内容）*

