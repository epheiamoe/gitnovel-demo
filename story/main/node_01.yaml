scene: '# 场景：空白早晨


  ## 地点

  毕业典礼会场，昏暗的休息室角落


  ## 环境

  你睁开眼睛。


  天花板上的日光灯发出微弱的嗡嗡声，有一盏似乎快要烧坏了，正以某种不规则的频率闪烁着。空气里飘着一股陈旧的气息，混合着塑料座椅特有的味道，还有……某种淡淡的花香。


  你发现自己坐在一张塑料椅上。椅背的塑料膜还没有撕干净，硌得你的后背有些发疼。


  周围三三两两坐着一些人，都穿着统一的黑色学士服。有的在低头看手机，有的在轻声交谈，有的闭着眼睛休息。他们的脸上洋溢着兴奋和感慨交织的神情——毕竟，这是人生中难得的时刻。


  但你不知道自己为什么会在这里。


  你低头看了看自己：身上穿着一件皱巴巴的白衬衫，领口的扣子扣错了一颗。外面套着的学士服也皱成一团，不知道是被谁随手扔在椅子上还是被你自己踢下去的。


  口袋里有什么东西。


  你摸出来一看——是一张被揉得皱皱的纸。展开之后，上面用蓝色墨水写着几行字，笔迹潦草得几乎难以辨认：


  > **去礼堂前，先去104教室看看。**

  > **那里有重要的东西。**

  > **——小夏**


  小夏是谁？


  你盯着这个名字看了很久，但脑海里一片空白。试图回想，却只感到一阵剧烈的头痛，仿佛有什么东西在脑海深处拼命挣扎着想要浮出水面，却又被什么东西死死按住。


  窗外的阳光透过磨砂玻璃洒进来，在地板上投下一片模糊的光影。你隐约能听到远处传来的人声和音乐声，那是毕业典礼即将开始的信号。


  你坐在那里，手里握着那张皱巴巴的纸条，脑海中只剩下一个问题：


  **我是谁？**


  ---


  ## 可见物品

  - 手里的纸条（上面写着"去礼堂前，先去104教室看看"）

  - 周围的毕业生们

  - 磨砂玻璃窗


  ## 可探索方向

  - 104教室（在走廊的另一头）

  - 礼堂入口（主会场方向）

  - 休息室的其他角落

  '
story: '# 故事：空白早晨


  你不知道自己睡了多久。


  再次睁开眼睛的时候，周围的世界已经变得不一样了。那些熟悉的面孔、那些应该记得的名字、那些本该珍藏的回忆——全都消失得无影无踪，仿佛被人用橡皮擦从脑海中彻底抹去。


  只剩下无尽的空白。


  你坐在那张硌人的塑料椅上，试图回想起任何事情。一件也好。哪怕是自己的名字也好。但什么都没有。只有那片苍白的、无边无际的空白，还有从脑海深处传来的隐隐作痛。


  手里的纸条被你攥得更紧了。"小夏"——你默念着这个名字，舌尖仿佛能感受到它的重量。似乎是一个很亲近的人才会用的语气。"有重要的东西"——是什么样的东西，值得在毕业典礼这么重要的日子里，特意留下这样一张纸条？


  你想不起来。


  周围的嘈杂声变得模糊起来。你听到有人在笑，有人在打电话，有人在叫某个名字……但这些声音都像是隔着一层水幕，遥远得不真实。


  只有那张纸条是真实的。


  那盏快要坏掉的日光灯又闪了一下，发出令人牙酸的滋滋声。在那一瞬间的明暗交替中，你恍惚看到了一些画面——


  图书馆靠窗的位置。


  某个人的笑容。


  一个声音，很轻很轻地叫着你的名字。


  然后，一切消失。


  你猛地回过神来，心跳快得像是要从胸口跳出来。那是什么？那是……记忆吗？为什么什么都想不起来？


  你深吸一口气，试图让自己平静下来。


  毕业典礼的音乐声从远处传来，庄严而有些煽情。也许你应该直接去礼堂——毕竟这是毕业典礼，你应该是来参加毕业典礼的。但那张纸条上的字却在你心里留下了痕迹。


  104教室。


  那里有什么在等着你呢？


  ---


  *你缓缓站起身，双腿有些发软。周围的人都没有注意到你，每个人都沉浸在自己的世界里。*


  *你该往哪里去？*

  '
