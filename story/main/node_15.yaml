scene: "# 场景：真相浮现\n\n礼堂后台的杂物间里，灰尘在昏暗的灯光下浮动。\n\n你站在一张堆满杂物的桌子前。桌上铺着各种旧文件、破旧的装饰品，还有一盏摇摇欲坠的台灯。\n\
  \n小夏站在你身后，没有说话。只是静静地看着你的背影，像是在等待什么。\n\n你低头看着手中的文件夹。封面上\"梦境协议\"四个字像是烙印一样，灼烧着你的视线。\n\
  \n你深吸一口气，打开了它。\n\n第一页是一份申请表。抬头写着：\n\n**\"梦境重构计划——记忆选择性遗忘服务\"**\n\n下面是密密麻麻的条款。你扫视着那些文字，每一个词都像是冰锥一样刺入你的眼睛——\n\
  \n> **\"申请者自愿接受记忆重构，以避免创伤性记忆带来的伤害。\"**\n> \n> **\"本服务通过介入REM睡眠周期，实现特定记忆的选择性模糊化。\"\
  **\n> \n> **\"费用由梦境科技有限公司承担。\"**\n\n申请日期：2024年6月15日\n申请者签名：________________\n\n\
  那个签名。你认得那个笔迹。\n\n是你自己的。\n\n---\n\n\"那天晚上……\"\n\n小夏的声音从身后传来，很轻，很颤抖。\n\n\"你崩溃了。一直哭，一直说不想记起来……\"\
  \n\n她的声音哽住了。\n\n\"你说，那些记忆太痛了。你说，你不想让我看到你那个样子。你说……\"\n\n她深吸一口气。\n\n\"你说你宁愿忘记。\"\n\
  \n---\n\n**场景**: 礼堂后台·杂物间\n**时间**: 毕业典礼开始前\n**状态**: 真相揭露"
story: '# 故事：真相浮现


  文件夹里的每一页都像是一把刀。


  你翻动着那些纸张，手指在发抖。


  **"创伤性记忆"**。**"选择性遗忘"**。**"申请者自愿"**。


  每一个词都在告诉你同一件事——


  你的失忆，不是意外。


  是你自己选择的。


  "大三那年。"小夏的声音从身后传来，像是在念一段尘封的日记。


  "你家里出了一些事。我不知道具体是什么……你从来不肯告诉我。但是那天晚上……"


  她的声音开始颤抖。


  "那天晚上你来找我。浑身都在抖，脸色苍白得像纸。你抱着我，一直哭，一直说不想活了……"


  你的心跳停了一拍。


  "你说活着太累了。你说那些画面每天晚上都在梦里重演。你说你不要记得了。你说明明不是你的错，为什么你要记得……"


  她说不下去了。


  房间里只剩下她压抑的哭声。


  "我求过你。"过了很久，她才继续说下去，声音嘶哑，"我求你不要忘记。我说我会陪着你，我说我们可以一起扛……"


  "但是你说……"


  她转过身，泪流满面地看着你。


  "你说如果记得，你真的会死。"


  ---


  台灯的光芒摇摇晃晃。


  你看着手中的文件，看着那个签名。熟悉又陌生的笔迹，写下的却是你亲手选择的死刑判决书。


  那不是字。


  是你四年的记忆。


  是你和小夏的一切。


  ---


  **"如果记得，你真的会死。"**


  **这是你给自己的最后通牒。**'
