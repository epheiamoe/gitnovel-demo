scene: '# 场景：图书馆角落


  ## 地点

  校园图书馆，靠窗的角落座位


  ## 环境

  你告别小夏，独自一人来到了图书馆。


  图书馆是一栋三层的建筑，外表是古老的红砖墙，爬满了常青藤。推开门，一股纸张和木头特有的气息扑面而来。阳光透过高大的窗户洒进来，照亮了漂浮在空气中的尘埃，让整个空间笼罩在一种温暖的、金色的光芒中。


  这里很安静。偶尔有翻书的声音，有键盘敲击的声音，有脚步声轻轻走过。但没有人说话。每个人都在自己的世界里忙碌着。


  你沿着书架之间的过道往里走，脚步不由自主地放轻了。像是被这里的氛围感染，又像是……某种本能的指引。


  然后，你看到了那个角落。


  那是一个靠窗的位置。一张单人桌，一把椅子，窗外是一棵老樱花树的枝丫。阳光正好从窗户照进来，在桌面上投下斑驳的光影。


  你走过去，像是被什么力量牵引着。


  桌面上刻着一些字迹。


  你弯下腰，仔细辨认。那是一行用小刀或者圆规刻出来的字，笔迹歪歪扭扭，却带着某种稚拙的认真：


  > **2019.09.01 大一第一天**


  这是……你第一天来大学时刻的？


  你伸手抚过那些字迹，指尖触到木头的纹理。字迹已经很旧了，刻痕的边缘已经磨平，但依然能够辨认。2019年9月1日——那是四年前的今天，也是你大学生活的起点。


  你抬起头，看向窗户。


  窗户上贴着一张泛黄的便签纸，用透明胶带仔细地粘着，像是怕它会掉落。便签上写着几个字，笔迹很熟悉——是你自己的：


  > **记得每周三来这里占座哦**


  每周三。占座。


  你不知道为什么，但这句话让你的心脏猛地跳了一下。有什么画面在脑海里一闪而过——


  每周三的阳光。每周三的风。每周三坐在你对面的那个人。


  你的目光落在对面的椅子上。那张椅子是空的，桌面也很干净。但你仿佛能看到一个模糊的身影坐在那里，低头看书，偶尔抬头看你一眼，然后笑。


  你认识那个笑。


  那是小夏。


  ---


  ## 可见物品

  - 桌面上刻着的字："2019.09.01 大一第一天"

  - 窗户上的便签："记得每周三来这里占座哦"

  - 对面空着的椅子


  ## 可探索方向

  - 找找有没有其他留下的东西

  - 坐下来试着回忆

  - 继续探索图书馆

  '
story: '# 故事：图书馆角落


  你站在那张桌前，久久无法移开目光。


  2019.09.01。


  大一第一天。


  那是一切的起点——你的大学生活，你和小夏的故事，还有那些你拼命想要找回的记忆。


  你坐下来。


  椅子发出轻微的吱呀声，像是在欢迎一个久违的老朋友。阳光从窗户洒进来，照在你的脸上，温暖而柔和。你闭上眼睛，试图让自己沉入记忆的漩涡中。


  然后，画面来了。


  不是完整的画面，只是一些碎片——


  **碎片一：**


  阳光照在课桌上。你坐在这里，低着头看一本书——是一本很厚的专业书，你皱着眉头，像是看不懂。桌上刻着字，你的手里拿着一把圆规，犹豫着要不要刻下去。


  "在写什么呢？"


  一个声音从对面传来。你抬起头——


  一张笑脸出现在你的视线里。阳光照在她的侧脸上，她的眼睛弯成月牙形，好奇地看着你。


  "我叫小夏。"她说，"可以坐这里吗？"


  **碎片二：**


  还是这张桌子。窗外的樱花开了又落，落了又开。你们每周三都坐在这里，复习功课，或者只是安静地各看各的书。有时候她会带零食来，分给你一半；有时候她会睡着，醒来时脸上印着书的压痕。


  你从未告诉她，每次她睡着的时候，你都会偷偷看她的睡颜。


  那是每周三最幸福的时刻。


  **碎片三：**


  最后一个周三。


  你们坐在这里，窗外是即将凋零的樱花。她没有像往常一样看书，只是静静地看着你。


  "我们……"她的声音很轻，"我们是不是应该谈谈？"


  你想追问她要谈什么。但画面在这里断裂了，像是被人用剪刀剪掉的胶片。


  你睁开眼睛。


  阳光依旧温暖，窗户上的便签依旧在，桌上的刻痕依旧清晰。但那个"要谈谈"的周三之后发生了什么——你已经不记得了。


  也许，那些记忆就是从那时开始被封印的。


  ---


  *你坐在那张椅子上，阳光照在你的脸上。*


  *对面那张空着的椅子，似乎还残留着某个人的温度。*


  *"我们是不是应该谈谈？"——这句话像是一把钥匙，指向某个你不记得的秘密。*

  '
