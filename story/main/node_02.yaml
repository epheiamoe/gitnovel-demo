scene: '# 场景：神秘的信


  ## 地点

  教学楼104教室


  ## 环境

  你沿着走廊一直走，找到了104教室。


  教室的门虚掩着，轻轻一推就开了。没有开灯，整个教室笼罩在一种昏暗的氛围中。只有窗户透进来的阳光，在布满灰尘的空气中切割出一道道光柱。


  教室里的桌椅摆放得很整齐，是那种最普通的教室配置——前面是讲台，后面是黑板，一排排课桌椅整齐地排列着。墙上挂着课程表和时间表，纸张已经泛黄，边角卷曲。


  但这里显然很久没有人来过了。


  你走进去，脚步声在空旷的教室里回响。课桌上积着一层薄薄的灰，仿佛被遗忘在时间的角落里。窗台上有一盆枯萎的绿植，蜷缩成一团，已经彻底失去了生机。


  教室正中间的位置，有一张课桌和其他的略微不同。


  那是一张靠窗的桌子，位置很好，阳光刚好能照到。桌上放着一个白色的信封，在昏暗的环境中格外显眼，像是黑暗中唯一的灯火。


  你走近，拿起那个信封。


  信封上写着四个字：


  > **给毕业的自己**


  笔迹娟秀而熟悉，你不知道为什么，但看到这四个字的时候，心里涌起一种奇怪的感觉——像是某种失去已久的温度，正从记忆的深处缓缓苏醒。


  信封没有封口。


  你轻轻抽出里面的信纸，展开。


  ---


  ## 可见物品

  - 白色的信封，上面写着"给毕业的自己"

  - 信纸上的内容（等待阅读）

  - 窗台上枯萎的绿植

  - 积灰的课桌

  - 泛黄的课程表


  ## 可探索方向

  - 阅读信件内容

  - 在教室里寻找其他线索

  - 返回走廊

  '
story: '# 故事：神秘的信


  你展开那张信纸。


  纸张有些泛黄，但被保存得很好，折痕处略微起毛。信是用黑色墨水写的，笔迹娟秀而流畅，每一个字都带着温柔而郑重的温度。


  ---


  > **给毕业的自己：**

  >

  > 亲爱的，你还好吗？

  >

  > 当你读到这封信的时候，应该已经是毕业典礼了吧。四年过得真快啊，快得让人不敢相信。我们从那个什么都不懂的大一新生，一步步走到了今天。

  >

  > 你还记得吗？**大一那年，在图书馆第一次见到你。**

  >

  > 你坐在靠窗的位置，阳光照在你的侧脸上，你专注地看着一本书，眉头微微皱着——大概是在为考试发愁吧。我在你对面坐下，你抬头看了我一眼，然后——你就那样笑了。

  >

  > 那是我见过的最好看的笑容。

  >

  > 从那天起，我们就再也没分开过。

  >

  > 四年里，我们一起经历了那么多。期末考试的煎熬，社团活动的欢笑，宿舍里的深夜谈话，还有无数次在樱花树下的漫步……每一个瞬间，我都记得。

  >

  > 我知道有时候你会迷茫，会害怕，会怀疑自己是不是不够好。但我想让你知道——你已经很棒了。无论过去发生了什么，无论未来会面对什么，你都不是一个人。

  >

  > 因为我会在你身边。

  >

  > 永远。

  >

  > 毕业快乐，我最重要的人。

  >

  > **——永远在你身边的小夏**

  >

  > P.S. 你看到这个的时候，大概会有一瞬间的困惑吧。但没关系，慢慢来。我会在礼堂等你。


  ---


  你读完最后一个字，手指微微颤抖。


  小夏。


  那个在图书馆对你笑的女孩。那个说"永远在你身边"的人。那个……在礼堂等你的人。


  她知道你会来这里。她知道你会看到这封信。


  但为什么……你什么都不记得了？


  你盯着"大一那年，在图书馆第一次见到你"这句话，心里涌起一种难以名状的感觉。仿佛有什么东西在记忆深处拼命想要冲破封锁，却被什么力量死死按住。


  窗外的阳光不知何时变得更亮了，在教室里投下斑驳的光影。你注意到那张课桌上似乎还刻着什么字迹，被灰尘覆盖着，几乎看不清内容。


  也许……这里还藏着别的什么。


  ---


  *你把信小心地折好，放进口袋里。那个名字在你心里留下了深深的痕迹——小夏。*


  *但与此同时，一个更大的疑问也在心中升起：*


  *为什么这封信像是一直在等你？*

  *为什么你会失去所有记忆，却对"小夏"这个名字有着本能的熟悉？*

  '
