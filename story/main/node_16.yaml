scene: '# 场景：毕业典礼


  礼堂里人声鼎沸。


  你坐在人群中，周围是穿着学士服的学生和满脸欣慰的家长。空气中弥漫着花香和消毒水的气味，舞台上挂着"2026届毕业典礼"的横幅。


  一切都那么正式，那么庄重。


  但你的心跳得很快。手心里还残留着那份文件夹的触感——"梦境协议"四个字像烙印一样刻在你的脑海里。


  然后你听到了。


  "请XXX同学和小夏同学上台……"


  你愣住了。


  台上，主持人正在微笑着看向你们的方向。周围的人开始窃窃私语，有人用胳膊肘捅了捅你。


  "去吧，叫你呢。"


  小夏坐在你旁边。她今天化了淡妆，头发扎成了马尾，穿着整齐的学士服。她的眼睛看向舞台，然后又转向你。


  她微微一笑。


  那个笑容很温柔。也很苦涩。像是在说：我知道你会记得的。


  "去吧。"她说，声音很轻，"不管你怎么选，我都在。"


  她的手伸过来，在你的手背上轻轻拍了拍。


  然后她站起身，向舞台走去。


  人群自动为她让开一条路。她的背影在人群中穿行，学士服的袍子在灯光下微微飘动。


  你看着她越走越远。


  ---


  **场景**: 毕业典礼礼堂

  **时间**: 毕业典礼进行中

  **状态**: 关键抉择时刻'
story: '# 故事：毕业典礼


  小夏在往前走。


  一步，两步，三步……


  你看着她的背影。学士服的下摆在膝盖处轻轻晃动，马尾辫随着她的步伐一晃一晃的。


  她没有回头。


  但你知道她在等你。


  礼堂里很吵。有人在笑，有人在哭，有人在大声喊着同学的名字。但这些声音都像是从很远的地方传来，模糊而失真。


  你的脑海中闪过很多画面。


  樱花树下的石碑。暴雨中的校门口。天台上的约定。那本写满秘密的日记。黑暗中的拥抱。


  *"就算忘记了，我也会替你记得。"*


  还有那份协议。还有那句"如果记得，你真的会死"。


  所有的一切都在这一刻涌上来，撞击着你的心脏。


  小夏已经走到舞台边缘了。她还是没有回头。但她的脚步慢了下来。


  她在等。


  她说过，不管你怎么选，她都在。


  但她还是在等。


  ---


  毕业证书还空着。名字还差一个签名。你可以选择继续坐在这里，也可以选择冲上去。


  小夏在舞台边缘等待着。


  人群在窃窃私语。


  你该怎么做？


  ---


  **"不管你怎么选，我都在。"**


  **这是她给你的承诺。也是她给你的选择权。**'
