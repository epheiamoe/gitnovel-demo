scene: '# 场景：宿舍夜晚


  ## 地点

  宿舍楼走廊，晚上


  ## 环境

  你离开社团活动室，沿着来时的路往回走。


  夜幕已经降临。校园里的路灯亮了起来，昏黄的光在柏油路上投下一个又一个圆形的光斑。远处有蝉在鸣叫，此起彼伏，像是一首单调的夏日催眠曲。


  你不知不觉走到了宿舍楼。


  宿舍楼是一栋六层的旧楼，外墙刷着淡黄色的涂料，在夜色中显得有些昏暗。你站在楼下，抬头看着那些亮着灯的窗户——有的窗户透出暖黄色的光，有的则是冷白色的荧光。


  三楼走廊尽头的门上贴着一张纸条。


  你走近，撕下那张纸条。上面用熟悉的笔迹写着：


  > **318 - 你的房间**


  这是你的宿舍。


  你推开门。


  房间不大，但收拾得很整洁。一张单人床靠在墙边，床上的被褥叠得整整齐齐。书桌靠窗，上面摆着一台旧笔记本电脑，几本摞起来的书，还有——


  一本日记本。


  那是一本深蓝色封皮的日记本，封面有些磨损，边角卷曲，显然被翻阅过很多次。日记本上着一个小小的铜锁，锁孔里插着一把小钥匙。


  你拿起日记本，试图打开——


  但锁住了。


  你试着拔动那把小钥匙，但它纹丝不动。像是被什么东西粘住了，又像是锁芯已经生锈。


  你把日记本放下，目光落在书桌上。


  书桌的一角立着一个相框。相框里是一张照片——你和一个小女孩的合影。照片很旧了，边角有些泛黄，像是很多年前的照片。小女孩大概七八岁的样子，扎着两个羊角辫，笑得眼睛都眯成了一条缝。而你——


  你也笑得很开心。


  照片背面写着一行字：


  > **和小夏的第十年**


  你盯着那行字，心脏像是被什么东西狠狠击中了。


  第十年。


  你们认识十年了？


  那意味着……在大学之前，你们就已经认识了？


  但为什么……你一点印象都没有？


  ---


  ## 可见物品

  - 深蓝色封皮的日记本（锁着）

  - 铜锁里插着小钥匙

  - 和小女孩的合影（"和小夏的第十年"）

  - 窗台上的多肉植物


  ## 可探索方向

  - 想办法打开日记本

  - 仔细看这张照片

  - 在房间里找找钥匙

  '
story: '# 故事：宿舍夜晚


  你坐在书桌前，把那张照片拿起来，凑近台灯的光仔细端详。


  照片里的两个人笑得像是一对傻瓜。小女孩的眼睛弯弯的，露出两颗小虎牙；而少年——那是你——的笑容里带着某种宠溺的温柔，像是在看世界上最重要的宝贝。


  "和小夏的第十年。"


  那是什么意思？


  如果现在是2025年大学毕业，那么十年前应该是2015年。那时候的你应该是……十五岁，刚上高一。而小夏呢？也是十五岁？


  你们是高中同学？


  不，不对。


  照片里的小女孩看起来只有七八岁。如果是2015年，她应该才三四岁……


  你皱起眉头，试图理清时间线。


  现在是2025年，你们认识十年的话，就是2015年。但如果小夏现在22岁左右（大学毕业生），十年前她应该是12岁……


  照片里的她看起来不像12岁。


  这太奇怪了。


  你的目光落在那张照片上，看着那个笑得像个小太阳的小女孩。她是谁？为什么你们的合影会写着"和小夏的第十年"？


  除非——


  一张新的照片从日记本里滑落出来，飘到地上。


  你弯腰捡起来。


  那是一张更旧的照片，边角都已经卷曲发黄了。照片上是两个小孩子，一男一女，大概四五岁的样子，站在一棵很大的樱花树下。女孩子靠在男孩子的肩膀上，男孩子的手搭在女孩子的头上。


  两个小孩子的脸上都脏兮兮的，像是刚玩完泥巴回来。


  照片背面写着一行字，字迹歪歪扭扭的，像是小孩子写的：


  > **2022.03.28 和小夏的第八年**

  > **樱花树下的约定——要做一辈子好朋友！**


  2022年3月28日——那是大三下学期。


  但照片里的小孩子明显是四五岁的模样……


  除非你们真的是从小就认识。


  除非你们在很小很小的时候就认识了——然后在某个时刻，她从你的记忆里消失了——然后又在大学图书馆里，以"陌生人"的身份，重新出现在你的生命里。


  你的手开始发抖。


  如果这是真的……


  那"小夏"这个名字，不只是一个恋人的名字。


  她是你从小到大的青梅竹马。


  而你——把她忘记了。


  ---


  *你坐在那张照片前，手里还攥着那张"第八年"的照片。*


  *"要做一辈子好朋友"——那是小孩子的誓言。*


  *但你们做到了吗？*


  *你们不只是好朋友……你们变成了恋人。*


  *但现在，你连她是谁都不记得了。*


  *而那本锁着的日记本里……也许藏着所有的答案。*

  '
