  ## 情感笔记

  小夏在跨年夜说"谢谢你一直陪着我"——这句话的潜台词是，她一直在依赖你。而照片里你看着她的眼神那么温柔……


  你们明明那么相爱。


  但为什么，现在的你却什么都不记得？


