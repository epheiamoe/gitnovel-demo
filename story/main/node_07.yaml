scene: '# 场景：社团活动室


  ## 地点

  文学社活动室


  ## 环境

  你离开图书馆，沿着校园的小路走向社团活动室所在的那栋老楼。


  这是一栋有些年头的建筑，红砖墙面斑驳，爬山虎爬满了整面墙壁。楼道里光线昏暗，脚步声在水泥地面上回响。墙上挂着一些褪色的海报，都是往届社团活动的宣传画。


  你在三楼尽头找到了那扇门。


  门牌上写着"文学社"三个字，漆面已经有些剥落。门虚掩着，从门缝里透出一丝微弱的光。


  你推门进去。


  活动室不大，却塞满了东西。四面墙壁都是书架，上面摆满了各种书籍和杂志——有古典文学，有现当代小说，有诗集，还有几摞看起来很有年代感的期刊合订本。窗边放着一张旧沙发，茶几上是几个已经干枯的盆栽。


  墙上的相框里装满了照片，都是社团活动的留影。有读书分享会的，有写作比赛的，有户外采风的……每一张照片里都有一些人，笑得很开心。


  你的目光落在其中一张照片上。


  然后你停住了。


  那是一张两个人的合影。背景是这间活动室，墙上贴着"新年快乐"的彩带，桌上摆着一些零食和饮料。照片里的两个人站得很近——


  是你和小夏。


  她正在为你整理衣领，手指搭在你的领口，动作很轻柔。而你低着头看着她，嘴角带着一丝若有若无的笑意，眼神温柔得像是能溢出水来。


  这张照片……你们看起来太亲密了。


  不像是朋友。


  像是——


  你还没来得及细想，目光落在照片下方的角落里，看到了用极小的字写着的一行日期：


  > **2022.12.31 新年晚会**


  两年前的跨年夜。


  你们一起参加了文学社的新年晚会。然后她为你整理衣领，你低头看着她。


  那个眼神。


  那个笑容。


  那是恋人之间才会有的眼神。


  ---


  ## 可见物品

  - 墙上的照片墙

  - 那张特别的合影（2022.12.31 新年晚会）

  - 满书架的书籍杂志

  - 窗边的旧沙发和干枯的盆栽


  ## 可探索方向

  - 仔细看看这张照片

  - 翻翻桌上的文件

  - 看看墙上还有什么

  '
story: '# 故事：社团活动室


  你站在那张照片前，久久无法移开目光。


  照片里的那个眼神——那个笑容——那双手轻轻搭在领口上的动作——每一个细节都在告诉你，这两个人之间的关系绝不是"朋友"那么简单。


  那是恋人。


  是你和小夏。


  你的手指不由自主地抬起来，轻轻触碰那张照片。指尖触到冰凉的相框，你却仿佛能感受到那一刻的温度——


  画面再次涌来。


  **跨年夜。**


  活动室里挂着彩带，桌上摆满了零食和饮料。窗外有烟花在绽放，照亮了夜空。你和小夏站在角落里，不知道在说些什么。


  她抬起头，看到你的领带歪了。


  "等一下。"她说，声音带着一丝嗔怪，"你怎么连领带都打不好。"


  她的手抬起来，开始为你整理衣领。动作很轻柔，带着某种理所当然的亲昵。你低头看着她，看着她专注的侧脸，看着她微微颤动的睫毛——


  "你知道吗，"她一边整理一边说，声音很轻，"和你在一起的时候，我觉得……特别安心。"


  她抬起头，看着你。烟花的余光落在她的眼睛里，像是星星落进了水面。


  "谢谢你一直陪着我。"


  你的心脏猛地跳了一下。


  然后——


  画面在这里断裂了。


  像是被人用力撕开的纸，边缘参差不齐。有什么东西想要涌出来，却被某种力量死死地按住。


  你捂住额头，感受到一阵剧烈的头痛。


  但这一次，在疼痛之中，你隐约抓住了什么——


  **"和你在一起的时候，我觉得特别安心。"**


  **"谢谢你一直陪着我。"**


  那不是普通的话语。


  那是告白。


  小夏在跨年夜对你告白了。而你——


  你回应了她吗？


  你记不清了。你只记得那一刻她的眼睛那么亮，亮得像是装满了星星。而你的心跳那么快，快得像是随时会冲出胸腔。


  然后呢？


  然后——


  一切归于黑暗。


  ---


  *你站在那张照片前，手指依然悬在相框上方。*


  *那个跨年夜，你和小夏之间发生了什么？*


  *那之后，你们是恋人了吗？*


  *如果是的——*


  *那为什么在毕业照里，你的眼神那么空洞？*

  '
