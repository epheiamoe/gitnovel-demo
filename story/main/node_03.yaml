scene: '# 场景：教室走廊


  ## 地点

  教学楼走廊


  ## 环境

  你从104教室出来，沿着走廊继续往前走。


  走廊两侧的墙壁上挂满了历届毕业生的合影照片，整整齐齐地排列着，从最老的黑白照片到近些年的彩色照片，像是时光的走廊，记录着这所学校一届又一届的青春。


  你的脚步不由自主地慢了下来。


  那些照片里的人都笑得很灿烂，穿着那个年代特有的服装，摆着那个年代流行的姿势。每一张照片下面都有一行小字，写着年份和"毕业留影"的字样。


  你的目光扫过一张张照片，像是在寻找什么。


  然后——


  你停住了。


  在走廊的中段，有一张照片和其他的略微不同。不是那种整齐划一的合影，而是一张更随意、更生活化的照片。照片的边框有些旧了，颜色也不如其他的鲜艳，像是被人特意取下来过，又重新放回去的。


  照片下面写着一行字：


  > **2024届毕业留影**


  这是去年的照片。


  照片里有两个女生站在一起，背景是这所学校的标志性建筑——那棵据说已经有上百年历史的老樱花树。阳光正好，樱花正开，花瓣在风中轻轻飘落。


  左边的女生笑得很灿烂，眼睛弯成月牙形，长发在风中微微飘动。她的手拉着右边那个女生的袖子，像是在说什么开心的事情。


  右边那个女生……


  你盯着那张脸看了很久。


  那是你吗？


  五官轮廓、眉眼间距、甚至鼻梁的弧度——都和镜子里的自己一模一样。但和你现在的表情不同，照片里的你没有笑。你的眼神有些空洞，像是在看着某个很远的地方，又像是在努力压抑着什么。


  明明是毕业照，明明是应该开心的时刻。


  你却在微笑。


  旁边的女生却笑得很灿烂，像是在努力逗你开心。


  照片下方的角落里，用极小的字写着一行字：


  > **"不管发生什么，我都会陪着你。——小夏"**


  ---


  ## 可见物品

  - 墙上的历届毕业照片

  - 2024届毕业照中的两个人

  - 照片角落的留言


  ## 可探索方向

  - 仔细看看照片里的两个人

  - 继续往礼堂方向走

  - 找找其他照片

  '
story: '# 故事：教室走廊


  你站在那张照片前，久久无法移开视线。


  那是一张会让你感到陌生又熟悉的脸。熟悉，是因为每天你都会在镜子里看到它；陌生，是因为照片里的那个人的眼神，和你此刻的心境如出一辙。


  那种空洞的、不笑的表情。


  照片里的你站在樱花树下，阳光从头顶洒下来，樱花瓣落在你的肩上、头发上。明明是那么美的场景，你的眼神却像是穿透了镜头，在看着某个很远很远的地方。


  旁边的女生——小夏——正拉着你的袖子说着什么。她的笑容那么灿烂，那么温暖，像是一小团火焰，试图点燃你眼里的光。


  "不管发生什么，我都会陪着你。"


  那句话像是从照片里浮出来，刻进你的眼睛里。


  你忽然想起104教室里的那封信。信里说"永远在你身边"，说"你已经不是一个人"——现在你知道了，那不是空洞的承诺。那是照片里那个笑得像太阳一样的女生，在你最需要的时候，说给你听的誓言。


  可是——


  为什么照片里的你没有笑？


  为什么你的眼神那么空洞？


  毕业照应该是大学四年最美好的纪念，是青春的定格，是友谊和爱情的见证。但照片里的你看起来……像是在承受着什么。


  你伸手触碰那张照片，指尖触到冰凉的相框。


  就在这一瞬间——


  一个画面闪过你的脑海。


  白色的墙壁。消毒水的气味。某个声音在哭着说什么。


  然后是黑暗。


  你猛地收回手，心跳快得像是要从胸口跳出来。那是什么？那个画面——白色的墙壁，消毒水的气味——那是医院？那里发生了什么？为什么你会想到那个地方？


  头痛欲裂。


  你捂住额头，靠在墙上，大口大口地喘着气。周围的一切都变得模糊不清，只有那张照片还在你的视线里定格——照片里的你，和此刻的你，隔着时空遥遥相望。


  你到底遗忘了什么？


  ---


  *那个一闪而过的画面——白色的墙壁，消毒水的气味——像是一个危险的信号。*


  *那里埋藏着什么？*


  *毕业典礼还在等着你。小夏也在礼堂等你。*


  *但这张照片里的谜团，似乎比毕业典礼本身更重要。*

  '
choices:
