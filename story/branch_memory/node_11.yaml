scene: '# 场景：被遗忘的约定


  *——记忆闪回——*


  夕阳。


  你看到了夕阳。金色的光芒铺满了整个天台，把一切都染成了温暖的橙红色。


  你和小夏坐在天台边缘。脚悬在半空，下面是逐渐亮起灯火的校园。风吹过，带来远处操场的喧嚣声和青草的气息。


  "我们约定……"


  她说着，从口袋里掏出一张小小的纸条和一支笔。她低着头认真地写着什么，夕阳在她脸上投下柔和的光影。


  你看着她的侧脸，看着她认真的样子，心里涌起一种奇怪的感觉。好像知道要发生什么，又好像什么都不确定。


  "写好了。"


  她把纸条递给你。你接过来，打开——


  上面写着四个字：


  **"永远在一起"**


  字迹有些稚嫩，但一笔一划都很用力，好像要刻进纸里一样。


  "这是我们的约定。"她抬起头看着你，眼睛里映着夕阳的光，"不管发生什么，每年今天都要来这里。"


  你把纸条折好，小心翼翼地放进口袋。


  "好。"你说。


  她笑了，笑得很开心。然后她伸出手，小指勾住了你的小指。


  "拉钩。"


  *——记忆闪烁——*


  画面开始不稳定。夕阳、天空、她的脸……都在晃动。


  但你听到了自己的声音——


  "每年今天，我都会在这里等你。"


  ---


  **场景**: 记忆闪回——图书馆天台

  **时间**: 某个黄昏

  **状态**: 记忆不稳定，但核心约定依稀可辨'
story: '# 故事：被遗忘的约定


  *——记忆闪回——*


  "永远在一起"。


  你看着纸条上的四个字，心跳加速。


  这不是一时冲动的玩笑。你能感觉到当时自己的心情——那是认真的，郑重的，像是在许下某种誓言。


  "拉钩。"小夏伸出小指。


  你犹豫了一下，然后也伸出手，勾住了她的小指。


  "拉钩上吊，一百年不许变。"她笑着说，然后踮起脚尖，在你的额头上轻轻碰了一下，"这是盖章。"


  你的脸一下子红了。


  夕阳更红了，把她的脸也染成了粉色。你们就这样坐在天台边上，看着太阳一点一点落下去，看着校园的灯一盏一盏亮起来。


  "那个纸条……"她突然说，"你要收好哦。"


  "会的。"你说，"我会一直带着。"


  她靠在你肩上，没有说话。但你能感觉到她的笑容。


  *——然后画面开始崩塌——*


  不。不只是画面。声音也在消失。色彩也在褪去。


  你想要抓住什么——那张纸条、那个约定、那个瞬间——但它们都在从指缝间流走。


  只剩下最后一句话，在你脑海中回响：


  "不管发生什么，每年今天都要来这里。"


  *——记忆中断——*


  ---


  那张纸条……你放进了哪里？你说过会一直带着的。


  **记忆深处，有什么东西在隐隐作痛。**'
