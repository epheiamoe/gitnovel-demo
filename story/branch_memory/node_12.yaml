scene: '# 场景：秘密的笔记本


  *——记忆闪回——*


  台灯的光晕在黑暗中铺开，照亮了一小片书桌。


  你坐在宿舍的书桌前，面前摊着一本厚厚的笔记本。封面是深蓝色的，边角有些磨损——已经被翻过很多次了。


  你在写日记。笔尖在纸上沙沙作响，写下今天的流水账。


  "又在写那些秘密？"


  一个声音从背后传来，带着几分好奇和撒娇。你还没反应过来，就感觉到一个温热的重量靠在了你背上。


  小夏从背后探头过来，想要看笔记本上的内容。


  "不给看。"你笑着把本子合上，护在胸口。


  "哼，小气鬼。"她撅着嘴，但没有再抢，"我又不会告诉别人。"


  你看着她故作委屈的样子，忍不住笑了。"以后……"她的声音突然变得很轻，轻到你几乎听不清。


  "以后怎么？"你问。


  她没有看你，只是盯着自己的手指，声音像是蚊子哼：


  "以后……我想和你一起写。"


  房间里很安静。窗外的蝉鸣声忽远忽近。台灯的光把你的影子投在墙上，两个人的轮廓重叠在一起。


  "好啊。"你说，"我们一起。"


  她抬起头，眼睛亮晶晶的，像是盛满了星星。


  *——记忆开始变得模糊——*


  但画面没有继续。像是有人按下了暂停键，把这个瞬间定格在了这里。


  你试图回想"之后"——你们有没有真的一起写过那本日记？那本笔记本现在在哪里？


  但你想不起来。


  ---


  **场景**: 记忆闪回——宿舍书桌前

  **时间**: 某个夏夜

  **状态**: 记忆片段，缺少后续'
story: '# 故事：秘密的笔记本


  *——记忆闪回——*


  "我想和你一起写。"


  这句话在房间里回荡，比任何声音都清晰。


  小夏站在你背后，双手撑在书桌边缘，下巴几乎抵在你的肩膀上。她说话时的气息轻轻拂过你的耳廓，带着一点洗发水的清香。


  你的心跳漏了一拍。


  "好啊。"你说，声音有点哑，"我们一起。"


  然后呢？


  你拼命想要回想之后发生了什么。你们有没有找来另一本笔记本？你们有没有真的开始一起写日记？


  但什么都想不起来。


  记忆在这里断了。像是被撕掉的书页，留下参差不齐的边缘。


  你只记得那个瞬间——她说想和你一起写，你的回答是"好啊"。还有她眼睛里的光，像是把整个星空都装了进去。


  *——然后是漫长的空白——*


  笔记本。深蓝色封面。那本日记。


  它去哪了？你们一起写的那些内容，现在在哪里？


  *"以后……我想和你一起写。"*


  她的声音还在耳边。但你知道，有些"以后"没有来。


  ---


  **你感到一阵强烈的失落感。那本笔记本里写的是什么？为什么你一点印象都没有？**'
