scene: '# 场景：小夏的眼泪


  *——记忆闪回——*


  黑暗。


  什么都看不见。只有无尽的黑暗，和压抑的哭声。


  你在哭。


  不，不是"你在哭"。是你"看到"自己在哭。你站在某个地方，看着另一个自己蜷缩在角落里，肩膀剧烈地颤抖。


  周围一片漆黑。像是深夜，像是噩梦，像是世界末日。


  "我不想忘记……"


  你听到自己的声音，沙哑而绝望。


  "我不要忘记……"


  那是哭腔。是崩溃边缘的声音。是某个人在溺水时发出的最后求救。


  然后，有人抱住了你。


  是小夏。


  她什么都没说。只是紧紧地抱着你，用手轻轻拍着你的背。一下，两下，三下……像是在安抚一只受惊的小动物。


  "我不想忘记那些……"你听到自己的声音从她的怀里传出来，闷闷的，破碎的，"我不想忘记你……"


  她抱得更紧了。


  "没关系。"


  她的声音很轻，轻到几乎听不见。但你听到了。


  "就算忘记了……"她说，声音在颤抖，"我也会替你记得。"


  *——记忆开始崩塌——*


  黑暗在吞噬一切。小夏的脸、她的声音、她的温度——都在远去。


  你想要抓住她。你不想让她消失。


  但记忆像沙子一样从指缝间流走。


  最后听到的，是她的哭声。和你的哭声混在一起，纠缠在一起，然后一起消失在黑暗中。


  ---


  **场景**: 记忆闪回——某个黑暗的房间

  **时间**: 未知

  **状态**: 极度不稳定，情感冲击强烈'
story: '# 故事：小夏的眼泪


  *——记忆闪回——*


  "我不想忘记……"


  这句话从黑暗中传来，回荡在某个你看不见的地方。


  你看到了自己。蜷缩在角落里，像是一只受伤的幼兽。不知道是因为什么，你崩溃了。你在哭，在发抖，在试图抓住什么却什么都抓不住。


  四年的记忆。无数的日子。那些你以为理所当然的日常。


  它们都在消失。像是被什么东西吸走，一点一点地，不留痕迹。


  然后小夏来了。


  她什么都没问，什么都没说。只是蹲下来，把你抱进怀里。


  她的怀抱很温暖。她的心跳隔着衣服传来，一下一下，稳定而有力。


  "我不想忘记那些……"你在她怀里哭着说。


  你知道自己在说什么。那些人，那些事，那些感情——你都不要忘记。


  特别是她。


  特别是小夏。


  "没关系。"她说。


  她的声音也在抖。但她还是在安慰你。


  "就算忘记了……我也会替你记得。"


  *——记忆断裂——*


  这句话是承诺。也是告白。


  但你不记得自己有没有回应过这个承诺。你不记得那之后发生了什么。


  你只知道，当你再次"醒来"的时候，已经是毕业典礼的早晨了。


  而你什么都不记得。


  *除了她。*


  就算忘了所有的事，你还是记得有个人在黑暗中抱着你，告诉你她会替你记得。


  ---


  **"就算忘记了，我也会替你记得。"**


  **这是什么样的感情，才能说出这样的话？**'
