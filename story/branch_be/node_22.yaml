note: '# 线索笔记


  ## 本次发现

  - 🌧️ **下雨的春天**: 又一年过去了，你还是一个人

  - 😢 **莫名的眼泪**: 不知道为什么哭，只是觉得失去了重要的东西

  - 📝 **纸条消失了**: 毕业典礼那天的纸条，你从来没有用过

  - 🍃 **枯萎的绿萝**: 你甚至忘了照顾一盆植物


  ## 关于那场毕业典礼

  - 你本来应该去104教室，但你没有去

  - 你直接去了礼堂

  - 然后……你醒在了医院里

  - 记忆被封印了


  ## 碎片

  - 🌸 樱花

  - 🌧️ 大雨

  - 📚 图书馆的窗户

  - 😊 那个笑容


  ## 待解之谜

  - ❓ **104教室**: 那里有什么？你为什么没有去？

  - ❓ **小夏**: 照片里的女生是不是就是她？

  - ❓ **记忆**: 为什么要封印？发生了什么？

  - ❓ **现在的自己**: 这样活着，是对的吗？


  ## 内心感受

  空空的。像是一个被掏空的壳。眼泪流干了，却填不上那个空洞。

  '
