note: '# 线索笔记


  ## 本次发现

  - 📱 **照片**: 毕业典礼的照片，你和一个女生站在一起，笑得很开心

  - 👩 **女生**: 长头发，眼睛弯弯的，靠在你肩上

  - 📅 **日期**: 2024年6月15日——毕业典礼

  - 🔍 **搜索无果**: 微信好友里找不到，通讯录里也没有


  ## 关于那个女生

  - 她是谁？你们是什么关系？

  - 为什么你会在毕业典礼和她合影？

  - 为什么你删除了所有关于她的信息？


  ## 碎片记忆

  - 🌸 樱花，粉色的，落在肩上

  - 🌧️ 大雨，看不清窗外

  - 📚 图书馆的窗户，旧书的味道

  - 😊 很温柔的笑容


  ## 待解之谜

  - ❓ **她是谁**: 为什么你拼命想要忘记她？

  - ❓ **发生了什么**: 为什么你们会分开？

  - ❓ **为什么要删**: 你亲手删除了所有联系，为什么要这么做？


  ## 内心感受

  胸口有一种钝痛。不是剧痛，而是那种……空落落的痛。像是在不知道的时候，失去了什么很重要的东西，却连失去的是什么都不知道。

  '
