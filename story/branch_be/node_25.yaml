  ## 关于这个故事

  - 你经历了BE或Sweet的结局

  - 你发现了自己署名的文档

  - 故事的真面目被揭开了一角


  ## 终极问题

  - 你到底是谁？

  - 你写的故事，还是故事写了你？

  - 结束意味着什么？重新开始又意味着什么？


  ## Meta感

  - 故事里有作者署名

  - 作者的名字是你的

  - 你到底是玩家，还是作者？

  - 或者……两者都是？


  ## 最后的话

  无论选择什么，谢谢你玩完了这个故事。

  这是一个关于记忆、失去和重新开始的故事。

  也是关于——你和她之间的故事。


  *（空白毕业典礼 - 完）*

